name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # npm install (not ci) is required: npm ci has a known bug where it skips
      # OS-filtered optional packages (e.g. @rollup/rollup-linux-x64-gnu) on Linux
      # when the lockfile was generated on macOS. npm install resolves them correctly.
      - name: Install deps
        working-directory: frontend
        run: npm install

      - name: Ensure Rollup Linux binary
        working-directory: frontend
        run: |
          ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
          npm install --no-save @rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION
          node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_HILL_0377E1310 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/dist"
          api_location: ""
          skip_app_build: "true"
          skip_api_build: "true"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_HILL_0377E1310 }}
          action: "close"
